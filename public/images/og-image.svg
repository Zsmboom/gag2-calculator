    <rect x="0" y="0" width="120" height="120" rx="24" fill="#ffffff"/>
    <text x="60" y="86" font-family="Inter, system-ui, sans-serif" font-size="72" font-weight="800" text-anchor="middle" fill="#1e40af">G</text>
  </g>

  <!-- Title -->
