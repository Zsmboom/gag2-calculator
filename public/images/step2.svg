<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-labelledby="title desc">
  <title id="title">Roblox Fisch settings with UI Navigation enabled</title>
  <desc id="desc">A colorful game settings screen showing UI Navigation Tool enabled for a Fisch Macro setup.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="0.52" stop-color="#22c1dc"/>
      <stop offset="1" stop-color="#88e1ff"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0ea5e9"/>
      <stop offset="1" stop-color="#155eab"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#edf5ff"/>
    </linearGradient>
    <linearGradient id="toggle" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="1" stop-color="#10b981"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#12305c" flood-opacity="0.28"/>
    </filter>
    <pattern id="waves" width="96" height="32" patternUnits="userSpaceOnUse">
      <path d="M8 18c16-10 30-10 46 0s30 10 46 0" fill="none" stroke="#bff9ff" stroke-width="4" stroke-linecap="round" opacity="0.55"/>
    </pattern>
  </defs>

  <rect width="800" height="600" fill="url(#sky)"/>
  <circle cx="690" cy="90" r="48" fill="#ffe56c"/>
  <g fill="#ffffff" opacity="0.55">
    <circle cx="112" cy="86" r="20"/>
    <circle cx="140" cy="82" r="30"/>
    <circle cx="175" cy="89" r="20"/>
    <rect x="111" y="86" width="70" height="18" rx="9"/>
    <circle cx="512" cy="128" r="16"/>
    <circle cx="535" cy="126" r="24"/>
    <circle cx="563" cy="130" r="15"/>
    <rect x="512" y="128" width="57" height="14" rx="7"/>
  </g>

  <path d="M0 302c45-42 96-49 147-20 28 16 54 17 82 2 42-24 86-19 132 20v54H0z" fill="#1f5f69"/>
  <path d="M518 286c45-44 100-46 154-7 34 24 75 21 128-9v92H518z" fill="#174e62"/>
  <rect y="348" width="800" height="252" fill="url(#water)"/>
  <rect y="348" width="800" height="252" fill="url(#waves)" opacity="0.82"/>

  <g filter="url(#shadow)">
    <rect x="96" y="118" width="608" height="372" rx="24" fill="#1f2937"/>
    <rect x="121" y="143" width="558" height="322" rx="16" fill="url(#panel)"/>
    <rect x="121" y="143" width="558" height="58" rx="16" fill="#dbeafe"/>
    <path d="M121 183h558v28H121z" fill="#dbeafe"/>
    <text x="159" y="180" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700" fill="#1f3b67">Roblox Fisch Settings</text>
    <g transform="translate(606 160)">
      <circle cx="0" cy="0" r="9" fill="#ef4444"/>
      <circle cx="28" cy="0" r="9" fill="#facc15"/>
      <circle cx="56" cy="0" r="9" fill="#22c55e"/>
    </g>

    <g transform="translate(162 236)">
      <rect x="0" y="0" width="476" height="54" rx="12" fill="#f8fafc"/>
      <text x="22" y="34" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#31415b">Camera Mode</text>
      <rect x="340" y="12" width="110" height="30" rx="15" fill="#dbeafe"/>
      <text x="395" y="34" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#2563eb">Classic</text>

      <rect x="0" y="72" width="476" height="70" rx="12" fill="#ecfdf5" stroke="#10b981" stroke-width="4"/>
      <text x="22" y="105" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" fill="#0f5132">UI Navigation Tool</text>
      <text x="22" y="128" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#4b635b">Required for reliable Fisch Macro controls</text>
      <rect x="356" y="88" width="92" height="38" rx="19" fill="url(#toggle)"/>
      <circle cx="428" cy="107" r="15" fill="#ffffff"/>
      <path d="M383 108l12 12 25-27" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

      <rect x="0" y="160" width="476" height="54" rx="12" fill="#f8fafc"/>
      <text x="22" y="194" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#31415b">Graphics Quality</text>
      <g fill="#93c5fd">
        <rect x="336" y="177" width="18" height="18" rx="4"/>
        <rect x="362" y="177" width="18" height="18" rx="4"/>
        <rect x="388" y="177" width="18" height="18" rx="4"/>
        <rect x="414" y="177" width="18" height="18" rx="4" opacity="0.42"/>
      </g>
    </g>
  </g>

  <g filter="url(#shadow)">
    <path d="M118 492h282l42 58H84z" fill="#9a5428"/>
    <path d="M84 550h358v25H64z" fill="#63331e"/>
    <rect x="126" y="560" width="26" height="40" rx="6" fill="#4b2619"/>
    <rect x="330" y="560" width="26" height="40" rx="6" fill="#4b2619"/>
  </g>

  <g transform="translate(544 392)" filter="url(#shadow)">
    <path d="M0 50c33-48 89-53 130-10-31 35-83 41-130 10z" fill="#facc15"/>
    <path d="M116 40l42-27-10 47z" fill="#fb923c"/>
    <circle cx="39" cy="39" r="6" fill="#143047"/>
    <path d="M30 62c28 13 61 8 89-13" fill="none" stroke="#f97316" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
  </g>
</svg>
