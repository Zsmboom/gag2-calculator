<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-labelledby="title desc">
  <title id="title">AutoHotkey 安装向导游戏风格插画</title>
  <desc id="desc">电脑屏幕上显示 AutoHotkey 安装向导界面，带红色 Logo、进度条和右下角 Next 按钮。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eef6ff"/>
      <stop offset="1" stop-color="#dbe8f6"/>
    </linearGradient>
    <linearGradient id="monitor" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#23324a"/>
      <stop offset="1" stop-color="#101827"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbfdff"/>
      <stop offset="1" stop-color="#edf3f9"/>
    </linearGradient>
    <linearGradient id="redLogo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff5353"/>
      <stop offset="1" stop-color="#cf1f2b"/>
    </linearGradient>
    <linearGradient id="blueBtn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3f9cff"/>
      <stop offset="1" stop-color="#1f67d8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#1a2a44" flood-opacity="0.24"/>
    </filter>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#1d2d44" flood-opacity="0.18"/>
    </filter>
    <pattern id="pixelGrid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0v24" fill="none" stroke="#cbd9e8" stroke-width="1" opacity="0.35"/>
    </pattern>
  </defs>

  <rect width="800" height="600" fill="url(#bg)"/>
  <rect width="800" height="600" fill="url(#pixelGrid)" opacity="0.55"/>

  <g opacity="0.55">
    <rect x="74" y="92" width="44" height="44" rx="9" fill="#ffffff" opacity="0.7"/>
    <rect x="655" y="82" width="64" height="64" rx="14" fill="#ffffff" opacity="0.65"/>
    <rect x="96" y="452" width="86" height="18" rx="9" fill="#b7d4ff" opacity="0.55"/>
    <rect x="606" y="486" width="116" height="20" rx="10" fill="#b7d4ff" opacity="0.45"/>
    <circle cx="702" cy="168" r="8" fill="#ff4f5f"/>
    <circle cx="124" cy="181" r="7" fill="#2f8bff"/>
    <path d="M161 113l17 17-17 17-17-17z" fill="#ffc247"/>
  </g>

  <ellipse cx="400" cy="530" rx="250" ry="32" fill="#8aa0ba" opacity="0.24"/>

  <g filter="url(#shadow)">
    <rect x="128" y="74" width="544" height="354" rx="24" fill="url(#monitor)"/>
    <rect x="150" y="97" width="500" height="302" rx="14" fill="url(#screen)"/>
    <rect x="150" y="97" width="500" height="34" rx="14" fill="#e7eef7"/>
    <path d="M150 118h500v20H150z" fill="#e7eef7"/>
    <circle cx="174" cy="116" r="6" fill="#ff5e69"/>
    <circle cx="194" cy="116" r="6" fill="#ffc247"/>
    <circle cx="214" cy="116" r="6" fill="#34c77b"/>
  </g>

  <g filter="url(#softShadow)">
    <rect x="206" y="151" width="388" height="218" rx="16" fill="#ffffff"/>
    <rect x="206" y="151" width="388" height="48" rx="16" fill="#f5f8fc"/>
    <path d="M206 183h388v24H206z" fill="#f5f8fc"/>
    <text x="274" y="181" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#23324a">AutoHotkey Setup Wizard</text>

    <g transform="translate(226 164)">
      <rect x="0" y="0" width="36" height="36" rx="9" fill="url(#redLogo)"/>
      <path d="M10 25L18 9l8 16h-5l-2-5h-4l-2 5z" fill="#ffffff"/>
      <rect x="14.5" y="17" width="7" height="3" rx="1.5" fill="#cf1f2b"/>
    </g>

    <rect x="232" y="222" width="336" height="20" rx="10" fill="#e8eef6"/>
    <rect x="232" y="222" width="214" height="20" rx="10" fill="#ff4f5f"/>
    <rect x="236" y="225" width="92" height="5" rx="2.5" fill="#ffffff" opacity="0.32"/>
    <text x="232" y="266" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#46566d">Installing AutoHotkey components...</text>
    <text x="232" y="291" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#7a889b">Destination: C:\Program Files\AutoHotkey</text>

    <g fill="#dfe7f1">
      <rect x="232" y="314" width="172" height="10" rx="5"/>
      <rect x="232" y="333" width="224" height="10" rx="5"/>
      <rect x="232" y="352" width="134" height="10" rx="5"/>
    </g>

    <rect x="478" y="323" width="90" height="34" rx="8" fill="url(#blueBtn)"/>
    <text x="523" y="345" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#ffffff">Next</text>
  </g>

  <g>
    <path d="M354 428h92l14 70H340z" fill="#1b2638"/>
    <path d="M363 428h74l7 37h-88z" fill="#2d3d56"/>
    <rect x="300" y="491" width="200" height="28" rx="14" fill="#172235"/>
    <rect x="326" y="486" width="148" height="16" rx="8" fill="#2d3d56"/>
  </g>

  <g opacity="0.8">
    <path d="M623 245h22v10h-22zM629 239h10v22h-10z" fill="#ffbf3f"/>
    <path d="M169 290h18v8h-18zM174 285h8v18h-8z" fill="#48d597"/>
    <path d="M612 132l12 12-12 12-12-12z" fill="#ff5e69"/>
  </g>
</svg>
