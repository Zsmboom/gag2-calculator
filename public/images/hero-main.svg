      <stop offset="0.76" stop-color="#FFC15E"/>
      <stop offset="1" stop-color="#FFE4A3"/>
    </linearGradient>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#19BDEB"/>
      <stop offset="0.55" stop-color="#168EDB"/>
      <stop offset="1" stop-color="#1263BE"/>
    </linearGradient>
    <linearGradient id="sunGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFF8B5" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#FF8B4A" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="dockTop" x1="0" y1="0" x2="0" y2="1">
