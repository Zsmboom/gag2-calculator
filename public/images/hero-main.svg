<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-labelledby="title desc">
  <title id="title">Roblox 风格方块人物在海边码头钓鱼</title>
  <desc id="desc">晚霞渐变天空、远处岛屿剪影、水面波光、跳跃的鱼，以及手持鱼竿的方块人物。</desc>
  <defs>
