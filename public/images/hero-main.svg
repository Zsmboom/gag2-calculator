<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-labelledby="title desc">
  <title id="title">Grow a Garden 2 — garden plots with crops at sunset</title>
  <desc id="desc">A stylized Roblox-style farming scene: gradient sky with sun, tilled garden beds with colorful crops, and a blocky farmer character.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7dd3fc"/>
      <stop offset="0.5" stop-color="#bae6fd"/>
      <stop offset="1" stop-color="#fef9c3"/>
    </linearGradient>
    <linearGradient id="soil" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a16207"/>
      <stop offset="1" stop-color="#713f12"/>
    </linearGradient>
    <linearGradient id="grass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4ade80"/>
      <stop offset="1" stop-color="#16a34a"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#1f2937" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="800" height="600" fill="url(#sky)"/>

  <circle cx="640" cy="120" r="60" fill="#fde047" opacity="0.95"/>
  <circle cx="640" cy="120" r="90" fill="#fef08a" opacity="0.35"/>

  <g opacity="0.7" fill="#ffffff">
    <circle cx="120" cy="90" r="16"/>
    <circle cx="142" cy="90" r="24"/>
    <circle cx="168" cy="92" r="16"/>
    <rect x="118" y="90" width="54" height="16" rx="8"/>
    <circle cx="380" cy="70" r="11"/>
    <circle cx="398" cy="70" r="18"/>
    <circle cx="418" cy="72" r="12"/>
    <rect x="378" y="70" width="44" height="13" rx="6"/>
  </g>

  <path d="M0 360 L800 360 L800 600 L0 600 Z" fill="url(#grass)"/>

  <g filter="url(#soft)">
    <rect x="60" y="330" width="680" height="210" rx="14" fill="url(#soil)"/>
    <g stroke="#92400e" stroke-width="4" opacity="0.5">
      <path d="M60 380 H740"/>
      <path d="M60 430 H740"/>
      <path d="M60 480 H740"/>
      <path d="M60 530 H740"/>
    </g>
    <g stroke="#78350f" stroke-width="3" opacity="0.6">
      <path d="M200 330 V540"/>
      <path d="M340 330 V540"/>
      <path d="M480 330 V540"/>
      <path d="M620 330 V540"/>
    </g>
  </g>

  <g>
    <ellipse cx="130" cy="410" rx="34" ry="12" fill="#15803d" opacity="0.4"/>
    <rect x="126" y="368" width="8" height="42" rx="3" fill="#15803d"/>
    <circle cx="130" cy="362" r="14" fill="#ef4444"/>
    <rect x="124" y="386" width="12" height="10" rx="2" fill="#22c55e"/>

    <ellipse cx="270" cy="460" rx="30" ry="10" fill="#15803d" opacity="0.4"/>
    <rect x="266" y="424" width="8" height="36" rx="3" fill="#15803d"/>
    <circle cx="262" cy="418" r="10" fill="#f97316"/>
    <circle cx="278" cy="414" r="9" fill="#fb923c"/>

    <ellipse cx="410" cy="400" rx="32" ry="11" fill="#15803d" opacity="0.4"/>
    <rect x="406" y="356" width="8" height="44" rx="3" fill="#15803d"/>
    <circle cx="410" cy="350" r="13" fill="#eab308"/>
    <g fill="#fde047"><circle cx="402" cy="346" r="3"/><circle cx="418" cy="348" r="3"/></g>

    <ellipse cx="550" cy="465" rx="28" ry="9" fill="#15803d" opacity="0.4"/>
    <rect x="546" y="430" width="8" height="34" rx="3" fill="#15803d"/>
    <circle cx="550" cy="424" r="11" fill="#a855f7"/>

    <ellipse cx="680" cy="410" rx="34" ry="12" fill="#15803d" opacity="0.4"/>
    <rect x="676" y="362" width="8" height="48" rx="3" fill="#15803d"/>
    <circle cx="680" cy="356" r="15" fill="#ec4899"/>
  </g>

  <g transform="translate(330 250)" filter="url(#soft)">
    <rect x="40" y="120" width="28" height="80" rx="8" fill="#2563eb"/>
    <rect x="68" y="120" width="28" height="80" rx="8" fill="#1d4ed8"/>
    <rect x="28" y="120" width="30" height="58" rx="8" fill="#93c5fd" transform="rotate(14 43 149)"/>
    <rect x="78" y="112" width="30" height="64" rx="8" fill="#93c5fd" transform="rotate(-30 93 144)"/>
    <rect x="40" y="44" width="56" height="56" rx="10" fill="#fcd34d"/>
    <rect x="30" y="38" width="76" height="20" rx="6" fill="#92400e"/>
    <rect x="50" y="64" width="10" height="10" rx="2" fill="#1f2937"/>
    <rect x="76" y="64" width="10" height="10" rx="2" fill="#1f2937"/>
    <rect x="56" y="84" width="24" height="6" rx="3" fill="#9a3412"/>
    <rect x="98" y="84" width="14" height="40" rx="5" fill="#fcd34d" transform="rotate(-40 105 104)"/>
    <circle cx="98" cy="124" r="6" fill="#ef4444"/>
  </g>

  <g fill="#ffffff" opacity="0.85">
    <circle cx="180" cy="160" r="3"/>
    <circle cx="300" cy="110" r="2.5"/>
    <circle cx="500" cy="180" r="3"/>
    <circle cx="720" cy="220" r="2.5"/>
  </g>
</svg>
